<!DOCTYPE html>
<html lang="{{ lang | default(value=config.default_language) }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ page.title | default(value=section.title) }} | {{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{{ page.description | default(value=section.description) | default(value=config.description) }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ get_url(path='main.css') }}">
  {% block head %}{% endblock head %}
</head>
<body>
  <div class="page-aura page-aura--one"></div>
  <div class="page-aura page-aura--two"></div>
  <div class="page-grid"></div>
  {% block content %}{% endblock content %}
</body>
</html>
